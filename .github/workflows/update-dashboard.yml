name: Update documentation dashboard

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "data/curated/**"
      - "package.json"
      - ".github/workflows/update-dashboard.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate curated data
        run: npm run validate

      - name: Collect GitHub data
        run: npm run collect
        env:
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_GITHUB_TOKEN || github.token }}
          GITHUB_ORG: TYPO3-Documentation
          STALE_PR_DAYS: "30"

      - name: Build dashboard
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
